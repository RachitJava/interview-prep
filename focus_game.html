<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Booster — Schulte Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #1e293b; line-height: 1.6; }
        
        .site-header { background: #fff; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; text-align: center; }
        .site-header nav { max-width: 1000px; margin: 0 auto; padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .site-header a { text-decoration: none; color: #475569; font-size: 8pt; font-weight: 500; padding: 4px 8px; border-radius: 4px; transition: all 0.2s; }
        .site-header a:hover { background: #f8fafc; color: #2563eb; }
        .site-header a.active { background: #2563eb; color: #fff; }

        .page-container { max-width: 600px; margin: 0 auto; padding: 40px 20px; text-align: center; }

        h1 { font-size: 24px; margin-bottom: 10px; color: #0f172a; }
        p.desc { color: #64748b; font-size: 14px; margin-bottom: 30px; }

        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; }
        .timer { font-variant-numeric: tabular-nums; color: #2563eb; }
        .next-num { padding: 4px 12px; background: #eff6ff; color: #1e40af; border-radius: 20px; border: 1px solid #bfdbfe; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .cell {
            aspect-ratio: 1;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }

        .cell:hover { border-color: #2563eb; color: #2563eb; transform: scale(1.02); }
        .cell:active { transform: scale(0.95); background: #f1f5f9; }
        .cell.correct { background: #22c55e; color: white; border-color: #22c55e; pointer-events: none; }
        .cell.wrong { animation: shake 0.4s; background: #fee2e2; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            margin-top: 20px;
        }
        .btn:hover { background: #1d4ed8; }

        @media (max-width: 600px) {
            .grid { gap: 6px; }
            .cell { font-size: 16px; }
        }
    
  /* --- Zoom Controls --- */
  .zoom-controls {
    position: fixed; bottom: 20px; right: 20px;
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); display: flex; gap: 5px; padding: 6px; z-index: 1000;
  }
  .zoom-btn {
    width: 34px; height: 34px; border: none; background: #f1f5f9; color: #475569;
    font-weight: 700; cursor: pointer; border-radius: 6px; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .zoom-btn:hover { background: #2563eb; color: #fff; }
  @media print { .zoom-controls { display: none; } }

</style>
</head>
<body>

<div class="page-container">
    <h1>Focus Booster</h1>
    <p class="desc">Find numbers 1 through 25 in ascending order as fast as you can. Don't look away from the center of the grid to train peripheral vision.</p>

    <div class="game-header">
        <div class="next-num">Next: <span id="target">1</span></div>
        <div class="timer">Time: <span id="time">0.0</span>s</div>
    </div>

    <div class="grid" id="grid"></div>

    <button class="btn" id="start-btn" onclick="startGame()">Start Game</button>
</div>

<div class="result-overlay" id="overlay">
    <h2 style="font-size: 32px; margin-bottom: 10px;">Well Done!</h2>
    <p id="final-time" style="font-size: 20px; color: #64748b;"></p>
    <button class="btn" onclick="startGame()">Try Again</button>
</div>

<script>
    let current = 1;
    let timer = null;
    let startTime = 0;
    const gridEl = document.getElementById('grid');
    const targetEl = document.getElementById('target');
    const timeEl = document.getElementById('time');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');

    function startGame() {
        current = 1;
        targetEl.textContent = current;
        timeEl.textContent = '0.0';
        overlay.style.display = 'none';
        startBtn.style.display = 'none';
        
        const nums = Array.from({length: 25}, (_, i) => i + 1);
        nums.sort(() => Math.random() - 0.5);
        
        gridEl.innerHTML = '';
        nums.forEach(n => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = n;
            cell.onclick = () => check(n, cell);
            gridEl.appendChild(cell);
        });

        startTime = Date.now();
        if(timer) clearInterval(timer);
        timer = setInterval(() => {
            timeEl.textContent = ((Date.now() - startTime) / 1000).toFixed(1);
        }, 100);
    }

    function check(n, el) {
        if (n === current) {
            el.classList.add('correct');
            current++;
            if (current > 25) {
                clearInterval(timer);
                document.getElementById('final-time').textContent = `Time: ${timeEl.textContent}s`;
                overlay.style.display = 'flex';
            } else {
                targetEl.textContent = current;
            }
        } else {
            el.classList.add('wrong');
            setTimeout(() => el.classList.remove('wrong'), 400);
        }
    }
</script>


<div class="zoom-controls">
  <button class="zoom-btn" onclick="changeZoom(-1)" title="Zoom Out">A-</button>
  <button class="zoom-btn" onclick="changeZoom(0)" title="Reset">A</button>
  <button class="zoom-btn" onclick="changeZoom(1)" title="Zoom In">A+</button>
</div>

<script>
  let zoomLevel = parseFloat(localStorage.getItem('zoomLevel')) || 1;
  
  function applyZoom() {
    // Target the main content containers
    const containers = document.querySelectorAll('.page-container, .container, .resume-paper');
    containers.forEach(el => {
      el.style.fontSize = zoomLevel + 'em';
    });
    // Also adjust headings slightly
    const headings = document.querySelectorAll('h1, h2, h3');
    headings.forEach(el => {
      el.style.transformOrigin = 'left center';
    });
  }

  function changeZoom(delta) {
    if (delta === 0) zoomLevel = 1;
    else zoomLevel = Math.max(0.5, Math.min(3, zoomLevel + delta * 0.1));
    localStorage.setItem('zoomLevel', zoomLevel);
    applyZoom();
  }
  
  // Apply on load
  window.addEventListener('DOMContentLoaded', applyZoom);
</script>

</body>
